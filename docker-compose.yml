services:
  kern:
    build:
      context: .
      target: dev
    ports:
      - "1212:3000"
    volumes:
      - .:/app:cached
      - /app/node_modules
      - /app/.next
      - kern-data:/app/data
      - kern-media:/app/public/kern/media
      - kern-screenshots:/app/data/screenshots
    env_file:
      - .env
    environment:
      NODE_ENV: development
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-kern}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-kern}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      SCREENSHOT_URL: http://screenshot:3000
    depends_on:
      - clickhouse
      - screenshot
    restart: unless-stopped

  screenshot:
    build:
      context: ./screenshot-service
    ports:
      - "1215:3000"
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "1213:8123"
      - "1214:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-kern}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-kern}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

volumes:
  kern-data:
  kern-media:
  kern-screenshots:
  clickhouse-data:
  clickhouse-logs:
