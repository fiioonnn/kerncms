services:
  kern:
    build:
      context: .
      target: runner
    ports:
      - "1212:3000"
    volumes:
      - kern-data:/app/data
      - kern-media:/app/public/kern/media
      - kern-screenshots:/app/data/screenshots
    env_file:
      - .env
    environment:
      NODE_ENV: production
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-kern}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-kern}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      SCREENSHOT_URL: http://screenshot:3000
    depends_on:
      - clickhouse
      - screenshot
    restart: unless-stopped

  screenshot:
    build:
      context: ./screenshot-service
    restart: unless-stopped

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-kern}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-kern}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-analytics}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    restart: unless-stopped

volumes:
  kern-data:
  kern-media:
  kern-screenshots:
  clickhouse-data:
  clickhouse-logs:
